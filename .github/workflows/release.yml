name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    env:
      TRANSCODES_BACKEND_URL: ${{ secrets.TRANSCODES_BACKEND_URL }}
      TRANSCODES_BACKEND_ENDPOINTS: ${{ secrets.TRANSCODES_BACKEND_ENDPOINTS }}

    steps:
      - name: checkout repository code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GIT_CHANGESET_TOKEN }}

      - name: setup node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: install dependencies
        run: npm ci

      # Node.js로 치환하여 JSON 따옴표가 보존되도록 함 (sed는 셸 이스케이핑으로 따옴표가 벗겨짐)
      - name: Inject Secrets into All Source Files
        env:
          _URL: ${{ secrets.TRANSCODES_BACKEND_URL }}
          _ENDPOINTS: ${{ secrets.TRANSCODES_BACKEND_ENDPOINTS }}
        run: |
          node --input-type=commonjs -e "
            const fs = require('fs');
            const path = require('path');
            function walk(dir) {
              return fs.readdirSync(dir, { withFileTypes: true, recursive: true })
                .filter(f => f.isFile() && f.name.endsWith('.ts'))
                .map(f => path.join(f.parentPath || f.path, f.name));
            }
            for (const file of walk('src')) {
              let c = fs.readFileSync(file, 'utf8');
              c = c.replace(/process\.env\.TRANSCODES_BACKEND_URL/g, JSON.stringify(process.env._URL));
              c = c.replace(/process\.env\.TRANSCODES_BACKEND_ENDPOINTS/g, JSON.stringify(process.env._ENDPOINTS));
              fs.writeFileSync(file, c);
            }
          "

      - name: Create release pull request
        id: changeset_action
        uses: changesets/action@v1
        with:
          publish: npm run release-package
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_CHANGESET_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_CHANGESET_TOKEN }}
